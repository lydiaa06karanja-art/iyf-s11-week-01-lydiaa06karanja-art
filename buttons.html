<!DOCTYPE html>
<html>
<head>
<style>
  button { padding: 12px 24px; margin: 8px; border-radius: 8px; border: none; cursor: pointer; font-size: 16px; }
  .primary { background: #4a90e2; color: white; }
  .primary:hover { background: #357ABD; }
  .secondary { background: #6c757d; color: white; }
  .secondary:hover { background: #5a6268; }
  .outline { background: transparent; border: 2px solid #4a90e2; color: #4a90e2; }
  .outline:hover { background: #4a90e2; color: white; }
  .danger { background: #dc3545; color: white; }
  .danger:hover { background: #c82333; }
  button:disabled { background: #ccc; cursor: not-allowed; }
</style>
</head>
<body>
  <button class="primary">Primary</button>
  <button class="secondary">Secondary</button>
  <button class="outline">Outline</button>
  <button class="danger">Danger</button>
  <button disabled>Disabled</button>
</body>
</html>
